<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoAd Reader — 광고 없는 RSS 리더</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e5e5e0;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --danger: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  }
  [data-theme="dark"] {
    --bg: #1a1a1a;
    --surface: #242424;
    --text: #f0f0ee;
    --text-muted: #a0a0a0;
    --border: #353535;
    --accent: #60a5fa;
    --accent-hover: #93c5fd;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.open { display: block; position: fixed; inset: 0; z-index: 10; width: 100%; }
  }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    overflow-y: auto;
  }
  .brand {
    font-size: 18px;
    font-weight: 700;
    margin: 0 8px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-mark {
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
  }
  .feed-add {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .feed-add input {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  .feed-add button {
    padding: 8px 12px;
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .feed-add button:hover { background: var(--accent-hover); }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin: 16px 8px 8px;
  }
  .feed-list { list-style: none; padding: 0; margin: 0; }
  .feed-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background 0.1s;
  }
  .feed-item:hover { background: var(--bg); }
  .feed-item.active { background: var(--bg); font-weight: 600; }
  .feed-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .feed-item-del {
    visibility: hidden;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
  }
  .feed-item:hover .feed-item-del { visibility: visible; }
  .feed-item-del:hover { color: var(--danger); background: var(--surface); }

  .main {
    padding: 32px 40px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  @media (max-width: 768px) {
    .main { padding: 16px; }
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    gap: 12px;
  }
  .current-feed {
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .toolbar-actions {
    display: flex;
    gap: 8px;
  }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .menu-btn { display: none; }
  @media (max-width: 768px) {
    .menu-btn { display: flex; }
  }
  .articles { display: flex; flex-direction: column; gap: 12px; }
  .article {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    box-shadow: var(--shadow);
  }
  .article:hover { border-color: var(--accent); }
  .article-title {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 6px;
    color: var(--text);
  }
  .article-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .article-snippet {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-hint { font-size: 14px; }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Reader overlay */
  .reader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    display: none;
  }
  .reader.open { display: block; }
  .reader-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }
  @media (max-width: 768px) {
    .reader-inner { padding: 16px; }
  }
  .reader-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }
  .reader-close, .reader-orig {
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .reader-close:hover, .reader-orig:hover { background: var(--surface); color: var(--accent); }
  .reader-title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    margin: 16px 0 8px;
  }
  .reader-meta {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .reader-body {
    font-size: 17px;
    line-height: 1.75;
  }
  .reader-body img { max-width: 100%; height: auto; border-radius: 6px; margin: 12px 0; }
  .reader-body a { color: var(--accent); }
  .reader-body p { margin: 16px 0; }
  .reader-body h1, .reader-body h2, .reader-body h3 { margin: 28px 0 12px; }
  .reader-body iframe { max-width: 100%; }

  .error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
  }
  [data-theme="dark"] .error { background: #2d1414; border-color: #5c2020; color: #fca5a5; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="brand-mark"></span> NoAd Reader</div>
    <div class="feed-add">
      <input id="feedUrl" type="text" placeholder="RSS URL 추가" />
      <button id="addBtn">추가</button>
    </div>
    <div class="section-title">내 피드</div>
    <ul class="feed-list" id="feedList"></ul>
    <div class="section-title">추천 피드</div>
    <ul class="feed-list" id="presetList"></ul>
  </aside>

  <main class="main">
    <div class="toolbar">
      <button class="icon-btn menu-btn" id="menuBtn" title="메뉴">☰</button>
      <h1 class="current-feed" id="currentFeed">피드를 선택하세요</h1>
      <div class="toolbar-actions">
        <button class="icon-btn" id="refreshBtn" title="새로고침">↻</button>
        <button class="icon-btn" id="themeBtn" title="다크모드">◐</button>
      </div>
    </div>
    <div id="content">
      <div class="empty">
        <div class="empty-title">환영합니다 👋</div>
        <div class="empty-hint">왼쪽에서 피드를 선택하거나 RSS URL을 추가해 보세요.</div>
      </div>
    </div>
  </main>
</div>

<div class="reader" id="reader">
  <div class="reader-inner">
    <div class="reader-bar">
      <button class="reader-close" id="readerClose">← 목록으로</button>
      <button class="reader-orig" id="readerOrig">원문 열기 ↗</button>
    </div>
    <h1 class="reader-title" id="readerTitle"></h1>
    <div class="reader-meta" id="readerMeta"></div>
    <article class="reader-body" id="readerBody"></article>
  </div>
</div>

<script>
const PRESETS = [
  { name: "한겨레 — 전체", url: "https://www.hani.co.kr/rss/" },
  { name: "경향신문 — 전체", url: "https://www.khan.co.kr/rss/rssdata/total_news.xml" },
  { name: "오마이뉴스", url: "https://rss.ohmynews.com/RSS/ohmynews.xml" },
  { name: "BBC 한국", url: "https://feeds.bbci.co.uk/korean/rss.xml" },
  { name: "Hacker News", url: "https://hnrss.org/frontpage" },
  { name: "The Verge", url: "https://www.theverge.com/rss/index.xml" },
  { name: "BBC World", url: "https://feeds.bbci.co.uk/news/world/rss.xml" }
];

const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";
const STORAGE_KEY = "noad_reader_feeds";

let feeds = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let currentUrl = null;
let currentItems = [];

const $ = (id) => document.getElementById(id);

function saveFeeds() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(feeds));
}

function renderFeedList() {
  const list = $("feedList");
  list.innerHTML = "";
  if (feeds.length === 0) {
    const li = document.createElement("li");
    li.style.cssText = "padding: 8px 10px; color: var(--text-muted); font-size: 13px;";
    li.textContent = "아직 추가된 피드가 없습니다.";
    list.appendChild(li);
  } else {
    feeds.forEach((f, idx) => {
      const li = document.createElement("li");
      li.className = "feed-item" + (f.url === currentUrl ? " active" : "");
      li.innerHTML = `<span class="feed-item-name"></span><button class="feed-item-del" title="삭제">×</button>`;
      li.querySelector(".feed-item-name").textContent = f.name;
      li.querySelector(".feed-item-name").onclick = () => loadFeed(f.url, f.name);
      li.querySelector(".feed-item-del").onclick = (e) => {
        e.stopPropagation();
        feeds.splice(idx, 1);
        saveFeeds();
        renderFeedList();
      };
      list.appendChild(li);
    });
  }

  const preset = $("presetList");
  preset.innerHTML = "";
  PRESETS.forEach(p => {
    const li = document.createElement("li");
    li.className = "feed-item" + (p.url === currentUrl ? " active" : "");
    li.innerHTML = `<span class="feed-item-name"></span>`;
    li.querySelector(".feed-item-name").textContent = p.name;
    li.onclick = () => loadFeed(p.url, p.name);
    preset.appendChild(li);
  });
}

async function loadFeed(url, name) {
  currentUrl = url;
  $("currentFeed").textContent = name || "불러오는 중…";
  $("content").innerHTML = `<div class="loading"><span class="spinner"></span>피드를 불러오는 중…</div>`;
  if (window.innerWidth <= 768) $("sidebar").classList.remove("open");
  renderFeedList();

  try {
    const res = await fetch(RSS2JSON + encodeURIComponent(url));
    const data = await res.json();
    if (data.status !== "ok") {
      throw new Error(data.message || "피드를 읽을 수 없습니다.");
    }
    currentItems = data.items || [];
    $("currentFeed").textContent = data.feed?.title || name || "피드";
    renderArticles();
  } catch (err) {
    $("content").innerHTML = `<div class="error">⚠️ ${err.message}<br><small>유효한 RSS URL인지 확인해 주세요.</small></div>`;
  }
}

function renderArticles() {
  const root = $("content");
  if (currentItems.length === 0) {
    root.innerHTML = `<div class="empty"><div class="empty-title">기사가 없습니다</div></div>`;
    return;
  }
  root.innerHTML = `<div class="articles"></div>`;
  const wrap = root.querySelector(".articles");
  currentItems.forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "article";
    const date = item.pubDate ? new Date(item.pubDate).toLocaleString("ko-KR", { dateStyle: "medium", timeStyle: "short" }) : "";
    const author = item.author ? ` · ${escape(item.author)}` : "";
    const snippet = stripHtml(item.description || item.content || "").slice(0, 180);
    div.innerHTML = `
      <h2 class="article-title"></h2>
      <div class="article-meta"></div>
      <p class="article-snippet"></p>
    `;
    div.querySelector(".article-title").textContent = item.title || "(제목 없음)";
    div.querySelector(".article-meta").textContent = date + author;
    div.querySelector(".article-snippet").textContent = snippet;
    div.onclick = () => openReader(idx);
    wrap.appendChild(div);
  });
}

function stripHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || "";
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function sanitize(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  tmp.querySelectorAll("script, style, iframe[src*='ads'], ins, [class*='ad-'], [id*='ad-'], [class*='advert']").forEach(el => el.remove());
  tmp.querySelectorAll("*").forEach(el => {
    [...el.attributes].forEach(attr => {
      if (attr.name.startsWith("on")) el.removeAttribute(attr.name);
    });
  });
  return tmp.innerHTML;
}

function openReader(idx) {
  const item = currentItems[idx];
  $("readerTitle").textContent = item.title || "(제목 없음)";
  const date = item.pubDate ? new Date(item.pubDate).toLocaleString("ko-KR", { dateStyle: "long", timeStyle: "short" }) : "";
  $("readerMeta").textContent = [item.author, date].filter(Boolean).join(" · ");
  $("readerBody").innerHTML = sanitize(item.content || item.description || "<p>본문이 없습니다.</p>");
  $("readerOrig").onclick = () => window.open(item.link, "_blank", "noopener");
  $("reader").classList.add("open");
  window.scrollTo(0, 0);
}

$("readerClose").onclick = () => $("reader").classList.remove("open");

$("addBtn").onclick = async () => {
  const url = $("feedUrl").value.trim();
  if (!url) return;
  $("feedUrl").value = "";
  try {
    const res = await fetch(RSS2JSON + encodeURIComponent(url));
    const data = await res.json();
    if (data.status !== "ok") throw new Error(data.message);
    const name = data.feed?.title || url;
    if (!feeds.some(f => f.url === url)) {
      feeds.push({ name, url });
      saveFeeds();
    }
    renderFeedList();
    loadFeed(url, name);
  } catch (err) {
    alert("피드를 추가할 수 없습니다: " + err.message);
  }
};

$("feedUrl").addEventListener("keydown", e => {
  if (e.key === "Enter") $("addBtn").click();
});

$("refreshBtn").onclick = () => {
  if (currentUrl) loadFeed(currentUrl, $("currentFeed").textContent);
};

$("themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("noad_theme", next);
};

$("menuBtn").onclick = () => $("sidebar").classList.toggle("open");

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && $("reader").classList.contains("open")) {
    $("reader").classList.remove("open");
  }
});

const savedTheme = localStorage.getItem("noad_theme");
if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);

renderFeedList();
</script>
</body>
</html>
