<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoAd Reader — 광고 없이 본문만</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e5e5e0;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --danger: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  }
  [data-theme="dark"] {
    --bg: #1a1a1a;
    --surface: #242424;
    --text: #f0f0ee;
    --text-muted: #a0a0a0;
    --border: #353535;
    --accent: #60a5fa;
    --accent-hover: #93c5fd;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  .topbar {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 10;
    box-shadow: var(--shadow);
  }
  .brand {
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .brand-mark {
    display: inline-block;
    width: 9px; height: 9px;
    background: var(--accent);
    border-radius: 50%;
  }
  .url-form {
    flex: 1;
    display: flex;
    gap: 8px;
    max-width: 720px;
    margin: 0 auto;
  }
  .url-input {
    flex: 1;
    min-width: 0;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .url-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .go-btn {
    padding: 10px 18px;
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .go-btn:hover { background: var(--accent-hover); }
  .go-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  @media (max-width: 640px) {
    .brand-text { display: none; }
    .topbar { padding: 10px 12px; gap: 6px; }
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  @media (max-width: 640px) {
    .container { padding: 24px 16px 60px; }
  }

  .welcome {
    text-align: center;
    padding: 40px 0;
  }
  .welcome h1 {
    font-size: 32px;
    margin: 0 0 12px;
    font-weight: 700;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 16px;
    margin: 0 0 8px;
  }
  .examples {
    margin-top: 36px;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .examples-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .example-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .example-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    color: var(--accent);
    font-size: 14px;
    word-break: break-all;
  }
  .example-item:last-child { border-bottom: none; }
  .example-item:hover { color: var(--accent-hover); text-decoration: underline; }

  .recent {
    margin-top: 24px;
  }
  .recent-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .recent-item:hover { border-color: var(--accent); }
  .recent-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .recent-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 16px;
  }
  .recent-del:hover { color: var(--danger); }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    padding: 16px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
  }
  .error strong { display: block; margin-bottom: 6px; font-size: 15px; }
  [data-theme="dark"] .error { background: #2d1414; border-color: #5c2020; color: #fca5a5; }

  .article {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 40px;
    box-shadow: var(--shadow);
  }
  @media (max-width: 640px) {
    .article { padding: 24px 20px; }
  }
  .article-source {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .article-source a { color: var(--accent); text-decoration: none; }
  .article-title {
    font-size: 28px;
    line-height: 1.3;
    margin: 0 0 12px;
    font-weight: 700;
  }
  .article-byline {
    font-size: 13px;
    color: var(--text-muted);
    padding-bottom: 18px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .article-body {
    font-size: 17px;
    line-height: 1.8;
  }
  .article-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 16px 0; display: block; }
  .article-body p { margin: 18px 0; }
  .article-body a { color: var(--accent); }
  .article-body h1, .article-body h2, .article-body h3 { margin: 32px 0 14px; line-height: 1.3; }
  .article-body pre { background: var(--bg); padding: 14px; border-radius: 8px; overflow-x: auto; font-size: 14px; }
  .article-body code { background: var(--bg); padding: 2px 5px; border-radius: 4px; font-size: 0.92em; }
  .article-body blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 18px 0;
    color: var(--text-muted);
  }
  .article-body figure { margin: 18px 0; }
  .article-body figcaption { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 6px; }
  .article-body iframe { max-width: 100%; }

  .reading-time {
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark"></span>
    <span class="brand-text">NoAd Reader</span>
  </div>
  <form class="url-form" id="urlForm">
    <input class="url-input" id="urlInput" type="url" placeholder="기사 URL을 붙여넣으세요 (예: https://...)" autocomplete="off" />
    <button class="go-btn" id="goBtn" type="submit">읽기</button>
  </form>
  <button class="icon-btn" id="themeBtn" title="다크모드">◐</button>
</header>

<div class="container" id="container">
  <div class="welcome" id="welcome">
    <h1>광고 없이, 본문만</h1>
    <p>읽고 싶은 기사 URL을 위에 붙여넣으면 광고·배너·추천 영역을 모두 걷어내고 본문만 보여드립니다.</p>

    <div class="examples">
      <div class="examples-title">예시로 시험해보기</div>
      <ul class="example-list" id="exampleList"></ul>
    </div>

    <div class="recent" id="recentBox" style="display:none;">
      <div class="examples-title">최근 읽은 글</div>
      <div id="recentList"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@mozilla/readability@0.5.0/Readability.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script>
const EXAMPLES = [
  "https://www.bbc.com/korean/articles/c0kge75712do",
  "https://en.wikipedia.org/wiki/Reader_view",
  "https://news.ycombinator.com/item?id=39000000"
];

const PROXIES = [
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const RECENT_KEY = "noad_reader_recent";
const $ = (id) => document.getElementById(id);

function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]"); } catch { return []; }
}
function saveRecent(list) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, 10)));
}
function pushRecent(url, title) {
  const list = getRecent().filter(r => r.url !== url);
  list.unshift({ url, title, at: Date.now() });
  saveRecent(list);
}

function renderWelcome() {
  const ex = $("exampleList");
  ex.innerHTML = "";
  EXAMPLES.forEach(url => {
    const li = document.createElement("li");
    li.className = "example-item";
    li.textContent = url;
    li.onclick = () => { $("urlInput").value = url; load(url); };
    ex.appendChild(li);
  });

  const recent = getRecent();
  const box = $("recentBox");
  const list = $("recentList");
  if (recent.length === 0) {
    box.style.display = "none";
    return;
  }
  box.style.display = "block";
  list.innerHTML = "";
  recent.forEach(r => {
    const div = document.createElement("div");
    div.className = "recent-item";
    const titleEl = document.createElement("span");
    titleEl.className = "recent-title";
    titleEl.textContent = r.title || r.url;
    titleEl.onclick = () => { $("urlInput").value = r.url; load(r.url); };
    const delBtn = document.createElement("button");
    delBtn.className = "recent-del";
    delBtn.textContent = "×";
    delBtn.title = "삭제";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      saveRecent(getRecent().filter(x => x.url !== r.url));
      renderWelcome();
    };
    div.appendChild(titleEl);
    div.appendChild(delBtn);
    list.appendChild(div);
  });
}

async function fetchVia(proxyFn, url, signal) {
  const res = await fetch(proxyFn(url), { signal });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.text();
}

async function fetchHtml(url) {
  let lastErr;
  for (const proxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 15000);
      const html = await fetchVia(proxy, url, controller.signal);
      clearTimeout(timer);
      if (html && html.length > 200) return html;
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("모든 프록시 요청 실패");
}

function estimateReadingTime(text) {
  const words = text.trim().split(/\s+/).length;
  const minutes = Math.max(1, Math.round(words / 250));
  return `${minutes}분 분량`;
}

async function load(rawUrl) {
  const url = rawUrl.trim();
  if (!url) return;
  let absUrl;
  try {
    absUrl = new URL(url.startsWith("http") ? url : "https://" + url).href;
  } catch {
    showError("올바른 URL이 아닙니다.", "주소를 확인해 주세요.");
    return;
  }

  $("goBtn").disabled = true;
  $("container").innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div>본문을 불러오고 있어요…</div>
    </div>`;

  try {
    const html = await fetchHtml(absUrl);
    const doc = new DOMParser().parseFromString(html, "text/html");

    const base = doc.createElement("base");
    base.href = absUrl;
    doc.head.insertBefore(base, doc.head.firstChild);

    doc.querySelectorAll("script, style, noscript, iframe, ins, [class*='ad-'], [id*='ad-'], [class*='advert'], [id*='advert'], [class*='banner'], [aria-label*='advert' i]").forEach(el => el.remove());

    const reader = new Readability(doc.cloneNode(true), { charThreshold: 200 });
    const article = reader.parse();

    if (!article || !article.content) {
      throw new Error("본문을 추출할 수 없습니다. 이 페이지는 JavaScript로 본문을 렌더링하거나 로그인이 필요한 사이트일 수 있어요.");
    }

    const cleanHtml = DOMPurify.sanitize(article.content, {
      ADD_TAGS: ["iframe"],
      ADD_ATTR: ["target"],
      FORBID_TAGS: ["script", "ins"],
    });

    const origin = new URL(absUrl).hostname;
    const byline = [article.byline, article.siteName].filter(Boolean).join(" · ");
    const readingTime = article.textContent ? estimateReadingTime(article.textContent) : "";

    $("container").innerHTML = `
      <article class="article">
        <div class="article-source">
          <a href="${escapeAttr(absUrl)}" target="_blank" rel="noopener">${escapeHtml(origin)} ↗</a>
        </div>
        <h1 class="article-title"></h1>
        <div class="article-byline"></div>
        <div class="article-body" id="articleBody"></div>
      </article>`;
    $("container").querySelector(".article-title").textContent = article.title || "(제목 없음)";
    $("container").querySelector(".article-byline").textContent = [byline, readingTime].filter(Boolean).join(" · ");
    $("articleBody").innerHTML = cleanHtml;

    fixRelativeUrls($("articleBody"), absUrl);

    pushRecent(absUrl, article.title || origin);
    history.replaceState(null, "", `?u=${encodeURIComponent(absUrl)}`);
  } catch (err) {
    showError(err.message || "알 수 없는 오류", absUrl);
  } finally {
    $("goBtn").disabled = false;
  }
}

function fixRelativeUrls(root, baseUrl) {
  const base = new URL(baseUrl);
  root.querySelectorAll("a[href]").forEach(a => {
    try { a.href = new URL(a.getAttribute("href"), base).href; } catch {}
    a.target = "_blank";
    a.rel = "noopener";
  });
  root.querySelectorAll("img[src]").forEach(img => {
    try { img.src = new URL(img.getAttribute("src"), base).href; } catch {}
    img.loading = "lazy";
  });
  root.querySelectorAll("img[srcset]").forEach(img => img.removeAttribute("srcset"));
}

function showError(message, hint) {
  $("container").innerHTML = `
    <div class="error">
      <strong>⚠️ 불러올 수 없습니다</strong>
      ${escapeHtml(message)}
      ${hint ? `<div style="margin-top:8px; font-size:13px; opacity:0.85; word-break:break-all;">${escapeHtml(hint)}</div>` : ""}
      <div style="margin-top:10px; font-size:13px; opacity:0.85;">
        가능한 원인: 사이트의 차단 정책, 로그인 필요, JavaScript로만 본문을 렌더링하는 SPA, 잘못된 URL.
      </div>
    </div>
    <div style="margin-top:24px; text-align:center;">
      <button class="go-btn" onclick="location.href=location.pathname">처음으로</button>
    </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

$("urlForm").addEventListener("submit", e => {
  e.preventDefault();
  load($("urlInput").value);
});

$("themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("noad_theme", next);
};

const savedTheme = localStorage.getItem("noad_theme");
if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);

const urlParam = new URLSearchParams(location.search).get("u");
if (urlParam) {
  $("urlInput").value = urlParam;
  load(urlParam);
} else {
  renderWelcome();
}
</script>
</body>
</html>
